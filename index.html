<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6F2" />
<title>Paige Madden Nails — Custom Order</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FAF6F2;
    --blush: #FBEBEB;
    --rose: #B46869;
    --dusty: #DC8289;
    --highlight: #F1BCBD;
    --card: #EDE5DE;
    --neutral: #B69886;
    --ink: #5F463F;
    --ink-2: #8C6A60;
    --ink-soft: rgba(95, 70, 63, 0.62);
    --hair: rgba(95, 70, 63, 0.12);
    --line: rgba(95, 70, 63, 0.16);
    --rose-30: rgba(180, 104, 105, 0.34);
    --surface: #FFFFFF;
    --shadow: 0 1px 2px rgba(95,70,63,0.04), 0 14px 34px rgba(95,70,63,0.07);
    --shadow-sm: 0 1px 2px rgba(95,70,63,0.05), 0 6px 16px rgba(95,70,63,0.05);
    --script: 'Pinyon Script', cursive;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Hanken Grotesk', system-ui, sans-serif;

    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: radial-gradient(125% 90% at 50% 0%, #F2ECE6 0%, #E7DDD4 100%);
    -webkit-font-smoothing: antialiased;
    color: var(--ink);
  }

  #root { min-height: 100%; }

  /* ── App shell (fills the phone viewport, capped for larger screens) ── */
  .app {
    height: 100vh;
    height: 100dvh;
    max-width: 460px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(95,70,63,0.06);
  }
  .app__scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .pad { padding: 0 26px; }

  /* ── Top bar (progress) ── */
  .topbar {
    padding: calc(var(--safe-top) + 20px) 24px 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .iconbtn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--hair);
    background: rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s ease, transform .1s ease;
  }
  .iconbtn:active { transform: scale(0.94); }
  .progress { flex: 1; }
  .progress__meta {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.26em;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 7px;
    padding-left: 2px;
  }
  .progress__track {
    height: 4px;
    border-radius: 99px;
    background: rgba(95,70,63,0.10);
    overflow: hidden;
  }
  .progress__bar {
    height: 100%;
    border-radius: 99px;
    background: var(--rose);
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* ── Footer CTA ── */
  .footer {
    flex-shrink: 0;
    padding: 14px 26px calc(var(--safe-bottom) + 30px);
    background: linear-gradient(180deg, rgba(250,246,242,0) 0%, var(--bg) 28%);
  }

  /* ── Headings ── */
  .eyebrow {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.30em;
    font-size: 12px;
    font-weight: 600;
    color: var(--rose);
  }
  .title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 32px;
    line-height: 1.16;
    letter-spacing: 0.004em;
    color: var(--ink);
    margin: 9px 0 0;
  }
  .title .script {
    font-family: var(--script);
    font-weight: 400;
    font-size: 1.22em;
    line-height: 0.8;
    letter-spacing: 0;
  }
  .lede {
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin: 16px 0 0;
    max-width: 32ch;
    text-wrap: pretty;
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 18px;
    background: var(--rose);
    color: #fff;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(180,104,105,0.34);
    transition: transform .12s ease, box-shadow .2s ease, opacity .2s ease;
  }
  .btn:active { transform: translateY(1.5px) scale(0.995); box-shadow: 0 6px 16px rgba(180,104,105,0.28); }
  .btn--soft {
    background: transparent;
    color: var(--ink);
    box-shadow: none;
    min-height: 46px;
    font-weight: 500;
    font-size: 15px;
  }
  .btn[disabled] { opacity: 0.42; box-shadow: none; cursor: default; }
  .btn__hint {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 12px 0 0;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: 22px;
    box-shadow: var(--shadow);
  }

  /* ── Form fields ── */
  .field { margin-top: 18px; }
  .field__label {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: 0.005em;
  }
  .field__label .opt {
    font-weight: 500;
    color: var(--ink-soft);
    font-size: 12.5px;
  }
  .input, .textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 15px;
    padding: 0 16px;
    height: 54px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .textarea {
    height: auto;
    min-height: 108px;
    padding: 14px 16px;
    line-height: 1.5;
    resize: none;
  }
  .textarea--sm { min-height: 76px; }
  .reveal { animation: reveal .32s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes reveal { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .input::placeholder, .textarea::placeholder { color: rgba(95,70,63,0.40); font-weight: 400; }
  .input:focus, .textarea:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13);
  }
  .input.err, .textarea.err { border-color: var(--dusty); box-shadow: 0 0 0 3.5px rgba(220,130,137,0.16); }
  .field__err {
    margin: 7px 2px 0;
    font-size: 12.5px;
    color: #C26A6F;
    font-weight: 500;
  }

  /* ── Select (sizing) ── */
  .selwrap { position: relative; }
  .selwrap svg.chev {
    position: absolute;
    right: 13px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  select.sel {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 13px;
    height: 48px;
    padding: 0 36px 0 15px;
    font-family: var(--sans);
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  select.sel:focus { border-color: var(--rose); box-shadow: 0 0 0 3.5px rgba(180,104,105,0.13); }
  select.sel.filled { background: #F3EDE6; border-color: rgba(95,70,63,0.24); color: var(--ink); }
  select.sel.unset { color: rgba(95,70,63,0.40); font-weight: 500; }

  /* ── Design tier ── */
  .tiers { display: flex; flex-direction: column; gap: 10px; }
  .tier {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 15px 16px;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: var(--shadow-sm);
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .tier.on { border-color: var(--rose); background: #FBF1F0; box-shadow: 0 0 0 3px rgba(180,104,105,0.12); }
  .tier__radio {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--line);
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    transition: border-color .15s ease;
  }
  .tier.on .tier__radio { border-color: var(--rose); }
  .tier.on .tier__radio::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--rose);
  }
  .tier__body { flex: 1; min-width: 0; }
  .tier__top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .tier__name { font-size: 16px; font-weight: 700; color: var(--ink); }
  .tier__price { font-size: 16px; font-weight: 700; color: var(--rose); }
  .tier__desc { display: block; font-size: 13px; line-height: 1.4; color: var(--ink-soft); margin-top: 4px; }

  /* ── Sizing rows ── */
  .hand { margin: 16px 22px 0; padding: 6px 18px 8px; }
  .hand__head {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 0 6px;
  }
  .hand__title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--ink);
    white-space: nowrap;
  }
  .hand__count {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .frow {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid var(--hair);
  }
  .frow .finger {
    flex: 1;
    font-size: 15.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .frow .selwrap { width: 124px; flex-shrink: 0; }

  /* ── Shape picker ── */
  .subhead {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.005em;
    margin: 4px 0 11px;
  }
  .shapes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 11px;
  }
  .shape {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 8px 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: var(--shadow-sm);
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .1s ease;
  }
  .shape:active { transform: scale(0.98); }
  .shape.on {
    border-color: var(--rose);
    background: #FBF1F0;
    box-shadow: 0 0 0 3px rgba(180,104,105,0.12);
  }
  .shape__silbox {
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape__icon {
    width: auto;
    height: 76px;
    display: block;
    object-fit: contain;
  }
  .shape__name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.01em;
  }

  /* ── Upload ── */
  .drop {
    margin-top: 8px;
    border: 1.6px dashed rgba(95,70,63,0.22);
    border-radius: 20px;
    background: #F5EFE9;
    padding: 26px 20px;
    text-align: center;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .drop:active { background: #EFE7DF; }
  .drop__circle {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #fff;
    margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
  }
  .drop__t { font-weight: 600; font-size: 15.5px; color: var(--ink); }
  .drop__s { font-size: 13px; color: var(--ink-soft); margin-top: 4px; line-height: 1.4; }
  .thumbs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 15px;
    overflow: hidden;
    background: var(--card);
    box-shadow: var(--shadow-sm);
    animation: pop .3s cubic-bezier(.2,.9,.3,1.2);
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb__x {
    position: absolute; top: 6px; right: 6px;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: rgba(95,70,63,0.78);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }
  @keyframes pop { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }
  .photohint { font-size: 12.5px; color: var(--ink-soft); margin: 12px 2px 0; }
  .photohint.warn { color: var(--rose); font-weight: 600; }

  /* ── Segmented control ── */
  .seg {
    display: flex;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 4px;
    gap: 4px;
  }
  .seg button {
    flex: 1;
    height: 46px;
    border: none;
    border-radius: 11px;
    background: transparent;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: color .2s ease;
  }
  .seg button.on { background: var(--rose); color: #fff; box-shadow: 0 4px 12px rgba(180,104,105,0.28); }

  /* ── Welcome ── */
  .welcome {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: calc(var(--safe-top) + 36px) 28px 8px;
    background: radial-gradient(116% 52% at 50% 36%, var(--blush) 0%, var(--blush) 50%, var(--bg) 100%);
  }
  .welcome__logo {
    width: 100%;
    max-width: 314px;
  }
  .welcome__tag {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
    max-width: 17ch;
    margin: 14px auto 0;
  }
  .welcome__feats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin: 0 0 6px;
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.13em;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
  }
  .welcome__feats span { white-space: nowrap; }
  .welcome__feats i {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--rose);
    opacity: 0.5;
    display: block;
    flex-shrink: 0;
  }
  .welcome__spacer { flex: 1; }
  .microhint {
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 14px 0 2px;
    max-width: 42ch;
  }
  .handle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* ── Instagram CTA ── */
  .ig-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 18px auto 0;
    padding: 11px 20px;
    border-radius: 99px;
    border: 1px solid var(--rose-30);
    background: rgba(255,255,255,0.6);
    color: var(--rose);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14.5px;
    letter-spacing: 0.01em;
    text-decoration: none;
    box-shadow: var(--shadow-sm);
    transition: background .15s ease, transform .1s ease, box-shadow .2s ease;
  }
  .ig-cta:active { transform: scale(0.97); }
  .ig-cta:hover { background: #fff; box-shadow: 0 8px 20px rgba(180,104,105,0.16); }
  .ig-cta svg { flex-shrink: 0; }
  .ig-cta b { color: var(--ink); font-weight: 600; }

  /* ── Thank you ── */
  .thanks {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: calc(var(--safe-top) + 76px) 32px 0;
  }
  .thanks__seal {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 40px rgba(95,70,63,0.14);
    animation: pop .5s cubic-bezier(.2,.9,.3,1.2);
  }
  .thanks__title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 31px;
    line-height: 1.12;
    white-space: nowrap;
    color: var(--ink);
    margin: 20px 0 0;
  }
  .recap {
    width: 100%;
    margin-top: 22px;
    text-align: left;
    padding: 6px 4px;
  }
  .recap__row {
    display: flex;
    gap: 12px;
    padding: 13px 2px;
    border-top: 1px solid var(--hair);
    font-size: 14.5px;
  }
  .recap__row:first-child { border-top: none; }
  .recap__k { color: var(--ink-soft); width: 96px; flex-shrink: 0; font-weight: 500; }
  .recap__v { color: var(--ink); font-weight: 600; flex: 1; }

  /* ── Order number (thank-you) ── */
  .ordernum {
    width: 100%;
    margin: 22px 0 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .ordernum__label {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 9px;
  }
  .ordernum__chip {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid var(--rose-30);
    background: #FBF1F0;
    border-radius: 14px;
    padding: 12px 18px;
    cursor: pointer;
    font-family: var(--sans);
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .ordernum__chip:active { transform: scale(0.98); }
  .ordernum__chip.copied { border-color: var(--rose); background: #F7E7E6; }
  .ordernum__code {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--rose);
    font-variant-numeric: tabular-nums;
  }
  .ordernum__ico { display: flex; color: var(--rose); }
  .ordernum__hint {
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 11px 0 0;
    max-width: 34ch;
  }

  /* ── Confirmation (page 1 of 2) ── */
  .confirm {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: calc(var(--safe-top) + 44px) 30px 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .confirm .recap { margin-top: 18px; }

  /* ── Payment (page 2 of 2) ── */
  .pay {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 2px 24px 6px;
    /* Sized to fit common phones without scrolling; scrolls only as a
       safety net on very short screens so no method is ever clipped. */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .pay__lead { text-align: center; }
  .pay__lead .title { font-size: 25px; margin: 0; }
  /* The order-code callout — the one thing they must not miss */
  .paycode {
    margin: 11px 0 2px;
    border: 1.5px solid var(--rose-30);
    background: #FBF1F0;
    border-radius: 18px;
    padding: 12px 16px;
    text-align: center;
  }
  .paycode__label {
    font-family: var(--serif);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--rose);
    margin-bottom: 6px;
  }
  .paycode__amount {
    font-family: var(--serif);
    font-size: 37px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .paycode__sub {
    font-size: 12.5px;

    background: #fff;
    border-radius: 13px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;

    background: var(--surface);
    border-radius: 16px;
    padding: 7px 14px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform .1s ease, box-shadow .2s ease, border-color .15s ease;

  .paytile__logo { width: 46px; height: 46px; flex-shrink: 0; border-radius: 13px; }

  @keyframes stepIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  var SUPABASE_URL = 'https://rljarolbubpajqgrcbeq.supabase.co';

  function uuid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);

  // Save the order + upload photos to Supabase. We generate the id client-side
  // because RLS blocks reading the row back after insert.
  function saveOrderToSupabase() {
    if (!sb) return Promise.reject(new Error('Supabase client unavailable'));
    var tier = TIERS.filter(function (t) { return t.id === data.tier; })[0] || TIERS[0];
    var shipping = data.fulfillment === 'shipping';
    // Insert via the create_order RPC so we get back the sequential
    // order number (PM-###) even though RLS is insert-only and can't
    // read the row back. Returns { id, order_no }.
    return sb.rpc('create_order', {
      p_customer_name: data.name.trim(),
      p_email: data.email.trim() || null,
      p_phone: data.phone.trim() || null,
      p_nail_shape: data.shape || null,
      p_design_tier: data.tier,
      p_tier_price: tier.price,
      p_sizes: data.sizes,
      p_notes: data.notes.trim() || null,
      p_fulfillment: data.fulfillment,
      p_ship_speed: shipping ? data.shipSpeed : null,
      p_ship_to_name: shipping ? data.name.trim() : null,
      p_address_line1: shipping ? (data.address1.trim() || null) : null,
      p_address_line2: shipping ? (data.address2.trim() || null) : null,
      p_city: shipping ? (data.city.trim() || null) : null,
      p_region: shipping ? (data.state.trim() || null) : null,
      p_postal_code: shipping ? (data.zip.trim() || null) : null,
      p_country: shipping ? 'US' : null
    }).then(function (res) {
      if (res.error) throw res.error;
      var rec = Array.isArray(res.data) ? res.data[0] : res.data;
      if (!rec || !rec.id) throw new Error('Order insert returned no id');
      var order = { id: rec.id, order_no: rec.order_no };
      if (!photos.length) return order;
      var uploads = photos.map(function (p, i) {
        var path = order.id + '/' + (i + 1) + '.jpg';
        return sb.storage.from('inspiration')
          .upload(path, p.blob, { contentType: 'image/jpeg', upsert: false })
          .then(function (up) {
            if (up.error) throw up.error;
            return { order_id: order.id, storage_path: path, position: i };
          });
      });
      return Promise.all(uploads).then(function (rows) {
        return sb.from('order_photos').insert(rows).then(function (pr) {
          if (pr.error) throw pr.error;
          return order;
        });
      });
    });
  }

  // Load tiers/shapes from the DB so prices/options can be changed without code.
  // Falls back silently to the hardcoded defaults if the fetch fails.
  function loadReferenceData() {
    if (!sb) return;
    sb.from('design_tiers').select('id,name,price,description').eq('active', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data && res.data.length) {
          TIERS = res.data.map(function (t) {
            return { id: t.id, name: t.name, price: Number(t.price), desc: t.description };
          });
          if (step === 2) render();
        }
      });
    sb.from('nail_shapes').select('id,image').eq('active', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data && res.data.length) {
          SHAPES = res.data.map(function (s) { return { id: s.id, img: s.image }; });
          if (step === 1) render();
        }
      });
    // Paige's payment handles (RLS returns only enabled methods with a handle set).
    sb.from('payment_methods').select('id,label,handle').eq('enabled', true).order('sort')
      .then(function (res) {
        if (!res.error && res.data) {
          PAY_METHODS = res.data.filter(function (m) {
            return PAY_BRAND[m.id] && m.handle && m.handle.trim();
          });
          if (step === 6) render();
        }
      });
  }

    applepay: { prefix: '', strip: /^/, mode: 'copy' },
  };
  // Methods Paige has set up (loaded from Supabase). Each: { id, label, handle }.
  var PAY_METHODS = [];

  // ── State ──
  var STORAGE_KEY = 'pmn-order-v1';
  function blankData() {
    return {
      shape: '', sizes: {}, notes: '',
      name: '', email: '', phone: '',
      fulfillment: 'pickup', shipSpeed: 'standard',
      address1: '', address2: '', city: '', state: '', zip: '',
      tier: 'classic',
    };
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { step: 0, data: blankData() };
      var parsed = JSON.parse(raw);
      return {
        step: typeof parsed.step === 'number' ? parsed.step : 0,
        data: Object.assign(blankData(), parsed.data || {}),
      };
    } catch (e) { return { step: 0, data: blankData() }; }
  }

  var init = loadState();
  var step = init.step;           // 0 welcome · 1 sizing · 2 design · 3 details · 4 confirm · 5 gallery · 6 payment
  var data = init.data;
  var photos = [];                // { id, url, blob, name } — not persisted
  var showErr = false;
  var sending = false;
  var lastOrder = null;           // { id, order_no } from the most recent submit

  function orderLabel(no) { return 'PM-' + no; }

  // Deposit due now: 50% of the set price, plus a flat $10 for rush shipping.
  var RUSH_FEE = 10;
  function selectedTier() {
    return TIERS.filter(function (t) { return t.id === data.tier; })[0] || TIERS[0];
  }
  function isRush() {
    return data.fulfillment === 'shipping' && data.shipSpeed === 'rush';
  }
  function depositAmount() {
    var price = Number(selectedTier().price) || 0;
    return price * 0.5 + (isRush() ? RUSH_FEE : 0);
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step: step, data: data })); }
    catch (e) {}
  }
  function go(n) { step = n; showErr = false; render(); }

  var root = document.getElementById('root');

  // ── Small DOM helpers ──
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }
  function topBar(label, n, total) {
    var bar = el('div', 'topbar');
    bar.innerHTML =
      '<div class="iconbtn" data-back style="color:var(--ink)">' + Icon.back + '</div>' +
      '<div class="progress">' +
        '<div class="progress__meta">' + label + ' · Step ' + n + ' of ' + total + '</div>' +
        '<div class="progress__track"><div class="progress__bar" style="width:' + ((n/total)*100) + '%"></div></div>' +
      '</div>';
    return bar;
  }

  // ════════════════════════════════════════ render ════════
  function render() {
    persist();
    document.documentElement.setAttribute('data-step', step);
    root.innerHTML = '';
    if (step === 0) root.appendChild(WelcomeScreen());
    else if (step === 1) root.appendChild(SizingScreen());
    else if (step === 2) root.appendChild(DesignScreen());
    else if (step === 3) root.appendChild(DetailsScreen());
    else if (step === 5) root.appendChild(GalleryScreen());
    else if (step === 6) root.appendChild(PaymentScreen());
    else root.appendChild(ConfirmationScreen());
    var sc = root.querySelector('.app__scroll');
    if (sc) sc.scrollTop = 0;
  }

  // ── 0 · WELCOME ──
  function WelcomeScreen() {
    var app = el('div', 'app');
    app.innerHTML =
      '<div class="app__scroll"><div class="welcome">' +
        '<div class="welcome__spacer"></div>' +
        '<img class="welcome__logo" src="logo.jpeg" alt="Paige Madden Nails" />' +
        '<p class="welcome__tag">Custom press-ons, made just for you.</p>' +
        '<a class="ig-cta" href="https://instagram.com/paigemadden.nails" target="_blank" rel="noopener">' + Icon.instagram + 'Follow me on Instagram</a>' +
        '<div class="welcome__spacer"></div>' +
        '<div class="welcome__feats"><span>Custom sizing</span><i></i><span>Handmade</span><i></i><span>Pickup or ship</span></div>' +
      '</div></div>' +
      '<div class="footer">' +
        '<button class="btn" data-start>Start my custom order' + Icon.arrow + '</button>' +
        '<button class="btn btn--soft" data-gallery style="margin-top:2px">' + Icon.instagram + ' Want some inspo?</button>' +
      '</div>';
    app.querySelector('[data-start]').onclick = function () { go(1); };
    app.querySelector('[data-gallery]').onclick = function () { go(5); };
    return app;
  }

  // ── 1 · SIZING (shape + finger sizes) ──
  function SizingScreen() {
    var app = el('div', 'app step');
    app.appendChild(topBar('Sizing', 1, 3));

    var scroll = el('div', 'app__scroll');
    scroll.innerHTML =
      '<div class="sectionlead pad">' +
        '<div class="eyebrow">Find your fit</div>' +
        '<h1 class="title">Shape &amp; sizes</h1>' +
        '<p class="lede">Choose your shape, then size each nail using the sample set on the table.</p>' +
      '</div>' +
      '<div class="pad"><div class="subhead">Nail shape</div><div class="shapes" data-shapes></div></div>' +
      '<div class="pad" style="margin-top:22px"><div class="subhead">Your sizes</div></div>' +
      '<div class="hand card" style="margin-top:0">' +
        '<div class="hand__head"><span class="hand__title">Each finger</span><span class="hand__count" data-count></span></div>' +
        '<div data-rows></div>' +
      '</div>' +
      '<p class="microhint pad">Not the same on both hands? Add a note on the next step and I\'ll sort it out.</p>' +
      '<div style="height:14px"></div>';

    // shapes
    var shapesWrap = scroll.querySelector('[data-shapes]');
    SHAPES.forEach(function (s) {
      var b = el('button', 'shape' + (data.shape === s.id ? ' on' : ''));
      b.innerHTML = '<span class="shape__silbox"><img class="shape__icon" src="' + s.img + '" alt="' + s.id + '" /></span><span class="shape__name">' + s.id + '</span>';
      b.onclick = function () {
        data.shape = s.id; persist();
        shapesWrap.querySelectorAll('.shape').forEach(function (x) { x.classList.remove('on'); });
        b.classList.add('on');
      };
      shapesWrap.appendChild(b);
    });

    // finger rows
    var rows = scroll.querySelector('[data-rows]');
    var countEl = scroll.querySelector('[data-count]');
    function updateCount() {
      var c = FINGERS.filter(function (f) { return data.sizes[f]; }).length;
      countEl.textContent = c + '/5 set';
    }
    FINGERS.forEach(function (f) {
      var row = el('div', 'frow');
      var opts = '<option value="">Size</option>' + SIZE_OPTS.map(function (o) {
        return '<option value="' + o + '"' + (data.sizes[f] === o ? ' selected' : '') + '>Size ' + o + '</option>';
      }).join('');
      row.innerHTML = '<span class="finger">' + f + '</span><div class="selwrap"><select class="sel ' + (data.sizes[f] ? 'filled' : 'unset') + '">' + opts + '</select>' + Icon.chev + '</div>';
      var sel = row.querySelector('select');
      sel.onchange = function () {
        data.sizes[f] = sel.value;
        if (!sel.value) delete data.sizes[f];
        sel.className = 'sel ' + (sel.value ? 'filled' : 'unset');
        persist(); updateCount();
      };
      rows.appendChild(row);
    });
    updateCount();

    app.appendChild(scroll);

    var footer = el('div', 'footer');
    footer.innerHTML = '<button class="btn" data-next>Continue' + Icon.arrow + '</button>';
    footer.querySelector('[data-next]').onclick = function () { go(2); };
    app.appendChild(footer);

    app.querySelector('[data-back]').onclick = function () { go(0); };
    return app;
  }

  // ── 2 · DESIGN (photos, notes, tier) ──
  function DesignScreen() {
    var app = el('div', 'app step');
    app.appendChild(topBar('Design', 2, 3));

    var scroll = el('div', 'app__scroll pad');
    scroll.innerHTML =
      '<div class="sectionlead" style="padding:6px 0 2px">' +
        '<div class="eyebrow">Your design</div>' +
        '<h1 class="title">Your inspiration</h1>' +
        '<p class="lede">Add a few photos: colours, shapes, lengths or sets you love. Optional, but it helps me get it right.</p>' +
      '</div>' +
      '<input type="file" accept="image/*" multiple data-file style="display:none" />' +
      '<div class="field">' +
        '<div class="drop" data-drop><div class="drop__circle" style="color:var(--rose)">' + Icon.camera + '</div>' +
          '<div class="drop__t" data-droptitle></div><div class="drop__s">Tap to upload from your camera roll</div></div>' +
        '<div class="thumbs" data-thumbs></div>' +
        '<div class="photohint" data-photohint></div>' +
      '</div>' +
      '<div class="field"><label class="field__label">Additional notes or requests<span class="opt"> · optional</span></label>' +
        '<textarea class="textarea" data-notes placeholder="e.g. love this design but in hot pink"></textarea></div>' +
      '<div class="subhead" style="margin-top:22px">Design tier</div>' +
      '<div class="tiers" data-tiers></div>' +
      '<p class="microhint" style="margin:10px 2px 0">Not sure which? Pick your best guess. I\'ll confirm the final price with you before I start.</p>' +
      '<div style="height:8px"></div>';

    // notes
    var notesEl = scroll.querySelector('[data-notes]');
    notesEl.value = data.notes;
    notesEl.oninput = function () { data.notes = notesEl.value; persist(); };

    // tiers
    var tiersWrap = scroll.querySelector('[data-tiers]');
    TIERS.forEach(function (tr) {
      var b = el('button', 'tier' + (data.tier === tr.id ? ' on' : ''));
      b.innerHTML = '<span class="tier__radio"></span><span class="tier__body"><span class="tier__top"><span class="tier__name">' + tr.name + '</span><span class="tier__price">' + money(tr.price) + '</span></span><span class="tier__desc">' + tr.desc + '</span></span>';
      b.onclick = function () {
        data.tier = tr.id; persist();
        tiersWrap.querySelectorAll('.tier').forEach(function (x) { x.classList.remove('on'); });
        b.classList.add('on');
      };
      tiersWrap.appendChild(b);
    });

    // photos
    var fileInput = scroll.querySelector('[data-file]');
    var drop = scroll.querySelector('[data-drop]');
    var thumbs = scroll.querySelector('[data-thumbs]');
    var dropTitle = scroll.querySelector('[data-droptitle]');
    var photoHint = scroll.querySelector('[data-photohint]');

    function totalBytes() { return photos.reduce(function (s, p) { return s + p.blob.size; }, 0); }
    function renderPhotos() {
      dropTitle.textContent = photos.length ? 'Add more photos' : 'Add inspiration photos';
      thumbs.innerHTML = '';
      photos.forEach(function (p) {
        var t = el('div', 'thumb');
        t.innerHTML = '<img src="' + p.url + '" alt="inspiration" /><button class="thumb__x">' + Icon.x + '</button>';
        t.querySelector('.thumb__x').onclick = function () {
          URL.revokeObjectURL(p.url);
          photos = photos.filter(function (x) { return x.id !== p.id; });
          renderPhotos();
        };
        thumbs.appendChild(t);
      });
      if (!photos.length) { photoHint.textContent = ''; photoHint.className = 'photohint'; return; }
      var mb = (totalBytes() / (1024 * 1024)).toFixed(1);
      if (totalBytes() > TOTAL_LIMIT) {
        photoHint.className = 'photohint warn';
        photoHint.textContent = photos.length + ' photo(s) · ' + mb + ' MB — a touch big to email. Please remove one or two. 💕';
      } else {
        photoHint.className = 'photohint';
        photoHint.textContent = photos.length + ' photo(s) ready · ' + mb + ' MB';
      }
    }
    drop.onclick = function () { fileInput.click(); };
    fileInput.onchange = function (e) {
      var files = Array.prototype.slice.call(e.target.files || []).slice(0, MAX_PHOTOS - photos.length);
      if (!files.length) { fileInput.value = ''; return; }
      dropTitle.textContent = 'Optimising…';
      var jobs = files.map(function (file) {
        if (!/^image\//.test(file.type)) return Promise.resolve(null);
        return compressImage(file).then(function (blob) {
          return { id: Date.now() + Math.random(), url: URL.createObjectURL(blob), blob: blob };
        }).catch(function () { return null; });
      });
      Promise.all(jobs).then(function (res) {
        res.forEach(function (r) { if (r) photos.push(r); });
        fileInput.value = '';
        renderPhotos();
      });
    };
    renderPhotos();

    app.appendChild(scroll);

    var footer = el('div', 'footer');
    footer.innerHTML = '<button class="btn" data-next>Continue' + Icon.arrow + '</button>';
    footer.querySelector('[data-next]').onclick = function () { go(3); };
    app.appendChild(footer);

    app.querySelector('[data-back]').onclick = function () { go(1); };
    return app;
  }

  // ── 3 · DETAILS ──
  function DetailsScreen() {
    var app = el('div', 'app step');
    app.appendChild(topBar('Details', 3, 3));

    var scroll = el('div', 'app__scroll pad');
    scroll.innerHTML =
      '<div class="sectionlead" style="padding:6px 0 2px">' +
        '<div class="eyebrow">Almost done</div>' +
        '<h1 class="title">Your details</h1>' +
        '<p class="lede">I\'ll be in touch to confirm your design, a price and timing.</p>' +
      '</div>' +
      '<div class="field"><label class="field__label">Your name</label>' +
        '<input class="input" data-name placeholder="First &amp; last name" /><div data-name-err></div></div>' +
      '<div class="field"><label class="field__label">Email</label>' +
        '<input class="input" type="email" inputmode="email" data-email placeholder="you@email.com" /></div>' +
      '<div class="field"><label class="field__label">Phone</label>' +
        '<input class="input" type="tel" inputmode="tel" data-phone placeholder="(000) 000-0000" /><div data-contact-err></div></div>' +
      '<div class="field"><label class="field__label">Pickup or shipping?</label>' +
        '<div class="seg"><button data-ful="pickup">' + Icon.bag + ' Pickup</button><button data-ful="shipping">' + Icon.truck + ' Ship to me</button></div></div>' +
      '<div data-ship></div>' +
      '<div style="height:8px"></div>';

    var nameEl = scroll.querySelector('[data-name]');
    var emailEl = scroll.querySelector('[data-email]');
    var phoneEl = scroll.querySelector('[data-phone]');
    nameEl.value = data.name; emailEl.value = data.email; phoneEl.value = data.phone;
    var attempted = false;
    nameEl.oninput = function () { data.name = nameEl.value; persist(); if (attempted) validate(); };
    emailEl.oninput = function () { data.email = emailEl.value; persist(); if (attempted) validate(); };
    phoneEl.oninput = function () { data.phone = phoneEl.value; persist(); if (attempted) validate(); };

    // pickup/ship segmented + reveal
    var shipWrap = scroll.querySelector('[data-ship]');
    function paintSeg() {
      scroll.querySelectorAll('[data-ful]').forEach(function (b) {
        b.classList.toggle('on', b.getAttribute('data-ful') === data.fulfillment);
      });
    }
    function renderShip() {
      if (data.fulfillment !== 'shipping') { shipWrap.innerHTML = ''; return; }
      shipWrap.innerHTML =
        '<div class="reveal">' +
          '<div class="field"><label class="field__label">Street address</label>' +
            '<input class="input" data-addr1 placeholder="123 Main St" /><div data-addr1-err></div></div>' +
          '<div class="field"><label class="field__label">Apt / suite<span class="opt"> · optional</span></label>' +
            '<input class="input" data-addr2 placeholder="Apt 4B" /></div>' +
          '<div class="field"><label class="field__label">City</label>' +
            '<input class="input" data-city placeholder="City" /><div data-city-err></div></div>' +
          '<div class="field"><label class="field__label">State</label>' +
            '<input class="input" data-state placeholder="State" maxlength="40" /><div data-state-err></div></div>' +
          '<div class="field"><label class="field__label">ZIP code</label>' +
            '<input class="input" type="text" inputmode="numeric" data-zip placeholder="00000" maxlength="10" /><div data-zip-err></div></div>' +
          '<div class="field"><label class="field__label">Shipping speed</label>' +
            '<div class="seg"><button data-spd="standard">Standard</button><button data-spd="rush">Rush</button></div>' +
            '<p class="microhint" data-spdhint style="margin:8px 2px 0"></p></div>' +
        '</div>';
      [['[data-addr1]','address1'],['[data-addr2]','address2'],['[data-city]','city'],['[data-state]','state'],['[data-zip]','zip']]
        .forEach(function (pair) {
          var inp = shipWrap.querySelector(pair[0]);
          inp.value = data[pair[1]] || '';
          inp.oninput = function () { data[pair[1]] = inp.value; persist(); if (attempted) validate(); };
        });
      function paintSpd() {
        shipWrap.querySelectorAll('[data-spd]').forEach(function (b) {
          b.classList.toggle('on', b.getAttribute('data-spd') === data.shipSpeed);
        });
        shipWrap.querySelector('[data-spdhint]').textContent =
          data.shipSpeed === 'rush' ? 'Rush: ready in about a week (+$10).' : 'Standard: ready in 2–3 weeks.';
      }
      shipWrap.querySelectorAll('[data-spd]').forEach(function (b) {
        b.onclick = function () { data.shipSpeed = b.getAttribute('data-spd'); persist(); paintSpd(); };
      });
      paintSpd();
    }
    scroll.querySelectorAll('[data-ful]').forEach(function (b) {
      b.onclick = function () { data.fulfillment = b.getAttribute('data-ful'); persist(); paintSeg(); renderShip(); };
    });
    paintSeg(); renderShip();

    app.appendChild(scroll);

    var footer = el('div', 'footer');
    footer.innerHTML =
      '<button class="btn" data-submit>Send my order 💖</button>' +
      '<p class="btn__hint" data-hint>Your details stay private, used only for your order.</p>';
    var submitBtn = footer.querySelector('[data-submit]');

    function validate() {
      var hasContact = emailEl.value.trim() || phoneEl.value.trim();
      var needsAddress = data.fulfillment === 'shipping';
      // paint errors
      nameEl.classList.toggle('err', !nameEl.value.trim());
      scroll.querySelector('[data-name-err]').innerHTML = !nameEl.value.trim() ? '<div class="field__err">Please add your name.</div>' : '';
      emailEl.classList.toggle('err', !hasContact);
      phoneEl.classList.toggle('err', !hasContact);
      scroll.querySelector('[data-contact-err]').innerHTML = !hasContact ? '<div class="field__err">Add an email or a phone number so I can reach you.</div>' : '';

      var addrOk = true;
      if (needsAddress) {
        [['[data-addr1]','[data-addr1-err]','Add a street address.'],
         ['[data-city]','[data-city-err]','Add a city.'],
         ['[data-state]','[data-state-err]','Add a state.'],
         ['[data-zip]','[data-zip-err]','Add a ZIP code.']].forEach(function (r) {
          var inp = shipWrap.querySelector(r[0]);
          if (!inp) { addrOk = false; return; }
          var empty = !inp.value.trim();
          inp.classList.toggle('err', empty);
          var box = shipWrap.querySelector(r[1]);
          if (box) box.innerHTML = empty ? '<div class="field__err">' + r[2] + '</div>' : '';
          if (empty) addrOk = false;
        });
        // light ZIP format check (US 5-digit or ZIP+4)
        var zipEl = shipWrap.querySelector('[data-zip]');
        if (zipEl && zipEl.value.trim() && !/^\d{5}(-\d{4})?$/.test(zipEl.value.trim())) {
          zipEl.classList.add('err');
          shipWrap.querySelector('[data-zip-err]').innerHTML = '<div class="field__err">Enter a 5-digit ZIP.</div>';
          addrOk = false;
        }
      }
      return nameEl.value.trim() && hasContact && addrOk;
    }

    submitBtn.onclick = function () {
      if (sending) return;
      attempted = true;
      if (!validate()) {
        var firstErr = scroll.querySelector('.input.err, .textarea.err');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      if (photos.length && photos.reduce(function (s, p) { return s + p.blob.size; }, 0) > TOTAL_LIMIT) {
        footer.querySelector('[data-hint]').innerHTML = '<span style="color:var(--rose);font-weight:600">Your photos are a little too large to email — please remove one or two on the previous step.</span>';
        return;
      }
      submitOrder(submitBtn, footer.querySelector('[data-hint]'));
    };
    app.appendChild(footer);

    app.querySelector('[data-back]').onclick = function () { go(2); };
    return app;
  }

  function resetOrder() {
    photos.forEach(function (p) { URL.revokeObjectURL(p.url); });
    photos = [];
    lastOrder = null;
    data = blankData();
    step = 0;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    render();
  }

  // ── 4 · CONFIRMATION (page 1 of 2) ──
  function ConfirmationScreen() {
    var firstName = (data.name.trim().split(' ')[0]) || 'lovely';
    var sized = FINGERS.filter(function (f) { return data.sizes[f]; }).length;
    var contact = data.email.trim() || data.phone.trim();

          recapRow('Tier', tierName) +

  // ── 6 · PAYMENT (page 2 of 2) ──
  function PaymentScreen() {
    var code = (lastOrder && lastOrder.order_no != null) ? orderLabel(lastOrder.order_no) : null;
    var deposit = depositAmount();
    var amountParam = deposit ? String(deposit) : '';
    var tier = selectedTier();
    var subline = '50% deposit on your ' + money(Number(tier.price) || 0) + ' ' + tier.name + ' set' +
      (isRush() ? ' · incl. ' + money(RUSH_FEE) + ' rush' : '');

    var app = el('div', 'app step');

    var bar = el('div', 'topbar');
    bar.innerHTML =
      '<div class="iconbtn" data-back style="color:var(--ink)">' + Icon.back + '</div>' +
      '<div class="progress"><div class="progress__meta">Final step · Payment</div></div>';
    app.appendChild(bar);

    var body = el('div', 'pay');
    var tiles = PAY_METHODS.map(function (m) {
      var brand = PAY_BRAND[m.id];
      var raw = m.handle.trim();
      var clean = raw.replace(brand.strip, '');
      var display = brand.prefix + clean;
      var logo = PayLogo[m.id] || '';
      if (brand.mode === 'link') {
        var href = brand.url(clean, code || '', amountParam);
        return '<a class="paytile" href="' + esc(href) + '" target="_blank" rel="noopener">' +
          logo +
          '<div class="paytile__body"><div class="paytile__name">' + esc(m.label) + '</div>' +
            '<div class="paytile__handle">' + esc(display) + '</div></div>' +
          '<span class="paytile__action"><span class="paytile__action-txt">Open</span>' + Icon.extern + '</span>' +
        '</a>';
      }
      return '<button class="paytile" type="button" data-copyhandle="' + esc(raw) + '">' +
        logo +
        '<div class="paytile__body"><div class="paytile__name">' + esc(m.label) + '</div>' +
          '<div class="paytile__handle">' + esc(display) + '</div></div>' +
        '<span class="paytile__action"><span class="paytile__action-txt">Copy</span>' + Icon.copy + '</span>' +
      '</button>';
    }).join('');

    body.innerHTML =
      '<div class="pay__lead">' +
        '<h1 class="title">Send your deposit</h1>' +
      '</div>' +
      '<div class="paycode">' +
        '<div class="paycode__label">Pay this deposit now</div>' +
        '<div class="paycode__amount">' + esc(money(deposit)) + '</div>' +
        '<div class="paycode__sub">' + esc(subline) + '</div>' +
        (code ?
          '<div class="paycode__div"></div>' +
          '<div class="paycode__codelabel">Add your order number to the note</div>' +
          '<button class="paycode__chip" type="button" data-copy="' + esc(code) + '">' +
            '<span class="paycode__code">' + esc(code) + '</span>' +
            '<span class="paycode__ico">' + Icon.copy + '</span>' +
          '</button>' +
          '<p class="paycode__note">Your payment <b>must</b> include <b>' + esc(code) + '</b> so I can match it to your set.</p>'
          : '') +
      '</div>' +
      (PAY_METHODS.length ?
        '<div class="paymethods">' + tiles + '</div>' :
        '<p class="pay__empty">I\'ll send you my payment details along with your quote. Nothing to pay just yet 💕</p>');
    app.appendChild(body);

    var footer = el('div', 'footer');
    footer.innerHTML = '<button class="btn btn--soft" data-reset>Start another order</button>';
    app.appendChild(footer);

    // Copy the order code chip
    var codeBtn = app.querySelector('[data-copy]');
    if (codeBtn) {
      codeBtn.onclick = function () {
        var codeEl = codeBtn.querySelector('.paycode__code');
        var icoEl = codeBtn.querySelector('.paycode__ico');
        var orig = codeEl.textContent;
        copyText(codeBtn.getAttribute('data-copy')).then(function () {
          codeBtn.classList.add('copied');
          codeEl.textContent = 'Copied';
          icoEl.innerHTML = Icon.checkSm;
          setTimeout(function () {
            codeBtn.classList.remove('copied');
            codeEl.textContent = orig;
            icoEl.innerHTML = Icon.copy;
          }, 1500);
        });
      };
    }
    // Copy-handle tiles (Zelle / Apple Pay)
    app.querySelectorAll('[data-copyhandle]').forEach(function (b) {
      b.onclick = function () {
        var txtEl = b.querySelector('.paytile__action-txt');
        var icoEl = b.querySelector('.paytile__action svg');
        var orig = txtEl.textContent;
        copyText(b.getAttribute('data-copyhandle')).then(function () {
          b.classList.add('copied');
          txtEl.textContent = 'Copied';
          if (icoEl) icoEl.outerHTML = Icon.checkSm;
          setTimeout(function () {
            b.classList.remove('copied');
            txtEl.textContent = orig;
            var ic = b.querySelector('.paytile__action svg');
            if (ic) ic.outerHTML = Icon.copy;
          }, 1500);
        });
      };
    });

    app.querySelector('[data-back]').onclick = function () { go(4); };
    app.querySelector('[data-reset]').onclick = resetOrder;
    return app;
  }
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });
    }
    return Promise.resolve(legacyCopy(text));
  }
  function legacyCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (e) {}
  }
  function recapRow(k, v) {
    return '<div class="recap__row"><span class="recap__k">' + k + '</span><span class="recap__v">' + esc(v) + '</span></div>';
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ── 5 · INSPIRATION (link out to Instagram) ──
  function GalleryScreen() {
    var app = el('div', 'app step');

    var bar = el('div', 'topbar');
    bar.innerHTML =
      '<div class="iconbtn" data-back style="color:var(--ink)">' + Icon.back + '</div>' +
      '<div class="progress"><div class="progress__meta">Inspiration</div></div>';
    app.appendChild(bar);

    var scroll = el('div', 'app__scroll');
    scroll.innerHTML =
      '<div class="inspo">' +
        '<img class="inspo__avatar" alt="Paige Madden Nails" data-avatar />' +
        '<div class="eyebrow">Want some inspo?</div>' +
        '<h1 class="title">See my latest sets</h1>' +
        '<a class="ig-cta" href="https://instagram.com/' + INSTAGRAM_HANDLE + '" target="_blank" rel="noopener" style="margin-top:22px">' +
          Icon.instagram + 'Connect with me on Instagram</a>' +
        '<p class="handle" style="margin-top:18px">@' + INSTAGRAM_HANDLE + '</p>' +
      '</div>';
    // Set src as a property so the long signed URL (with &) isn't HTML-parsed.
    scroll.querySelector('[data-avatar]').src = PROFILE_PHOTO_URL;
    app.appendChild(scroll);

    app.querySelector('[data-back]').onclick = function () { go(0); };
    return app;
  }

  // ── Image compression ──
  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function () {
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > h && w > MAX_DIM) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
        else if (h >= w && h > MAX_DIM) { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(function (blob) { blob ? resolve(blob) : reject(); }, 'image/jpeg', JPEG_QUALITY);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(); };
      img.src = url;
    });
  }

  // ── Submit to FormSubmit ──
  function submitOrder(btn, hintEl) {
    sending = true;
    btn.disabled = true;
    btn.textContent = 'Sending…';

    var tier = TIERS.filter(function (t) { return t.id === data.tier; })[0] || TIERS[0];
    var sizesStr = FINGERS.map(function (f) { return f + ' ' + (data.sizes[f] || '—'); }).join('  ·  ');

    function emailOrder(orderNo) {
      var ref = orderNo != null ? orderLabel(orderNo) : null;
      var fd = new FormData();
      fd.append('_subject', 'New order' + (ref ? ' ' + ref : '') + ' — ' + data.name.trim());
      fd.append('_template', 'table');
      fd.append('_captcha', 'false');

      if (ref) fd.append('Order #', ref);
      fd.append('Name', data.name.trim());
      if (data.email.trim()) fd.append('Email', data.email.trim());
      if (data.phone.trim()) fd.append('Phone', data.phone.trim());

      fd.append('Delivery', data.fulfillment === 'shipping' ? 'Ship to me' : 'Booth pickup');
      if (data.fulfillment === 'shipping') {
        var addrBlock = [
          data.address1.trim(),
          data.address2.trim(),
          [data.city.trim(), data.state.trim(), data.zip.trim()].filter(Boolean).join(', '),
          'USA'
        ].filter(Boolean).join('\n');
        fd.append('Shipping address', addrBlock);
        fd.append('Shipping speed', data.shipSpeed === 'rush' ? 'Rush (about a week, +$8)' : 'Standard (2–3 weeks)');
      }

      fd.append('Nail shape', data.shape || 'Not selected');
      fd.append('Sizes (both hands)', sizesStr);
      fd.append('Design tier', tier.name + ' (' + money(tier.price) + ')');
      fd.append('Notes', data.notes.trim() || '—');

      photos.forEach(function (p, i) { fd.append('Photo ' + (i + 1), p.blob, 'design-' + (i + 1) + '.jpg'); });

      return fetch(FORMSUBMIT_ENDPOINT, { method: 'POST', body: fd, mode: 'no-cors' })
        .then(function () { return true; })
        .catch(function () { return false; });
    }

    // Save to Supabase first (the durable record + the order number),
    // then email via FormSubmit with that number included. If the DB
    // save fails, still email so the order isn't lost. Proceed to the
    // thank-you if either one succeeds.
    saveOrderToSupabase().then(function (order) {
      lastOrder = order;
      return emailOrder(order.order_no).then(function (emailed) { return { db: true, emailed: emailed }; });
    }, function (e) {
      if (window.console) console.error('Supabase save failed:', e);
      lastOrder = null;
      return emailOrder(null).then(function (emailed) { return { db: false, emailed: emailed }; });
    }).then(function (r) {
      sending = false;
      if (!r.db && !r.emailed) {
        btn.disabled = false;
        btn.textContent = 'Send my order 💖';
        hintEl.innerHTML = '<span style="color:var(--rose);font-weight:600">That didn\'t send — please check your connection and try again. 💕</span>';
        return;
      }
      go(4);
    });
  }

  // boot
  render();
  loadReferenceData();
  </script>
